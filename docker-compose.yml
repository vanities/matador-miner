services:
  btx-miner:
    build:
      context: .
      args:
        # 0.32.11 compiled from source (native sm_120 codegen for the 5090; byte-
        # reproducible from a pinned tag commit). 0.32.11 = btx-node sync that HARDENS
        # MatMul v3 parent-MTP seed handling across CPU/Metal/CUDA: GPU nonce prehash
        # scanning now carries the active seed version + parent median-time-past, so the
        # accelerated miner verifies the SAME seed scope as consensus. Fixes the v3 GPU
        # solver stall we hit on 0.32.10 (its CUDA path didn't carry parent_mtp at height
        # >=130,500). Keeps the 130,500 v3 binding + 130,000 empty-block rule; ADDS forward
        # consensus at height 132,000 (velocity cap, empty-block penalty end, recovery-exit)
        # - upgrade before 132,000. 0.32.11 itself touches src/cuda/oracle_accel.cu (the
        # fix); our PR#58 patches stay OFF (already upstreamed; APPLY_LOCAL_PATCHES=0).
        BTX_SOURCE_REF: 215170f27f7d6889ce34aa7dbba2858ea07a468c
        BTX_CUDA_ARCHITECTURES: "120"   # sm_120 = RTX 5090 (Blackwell)
        # Our six PR #58 CUDA patches were upstreamed into 0.32.8, so the local
        # patches are OFF by default now (APPLY_LOCAL_PATCHES=0 in the Dockerfile).
        # Force-apply against an older base with:  APPLY_LOCAL_PATCHES: "1"
    image: btx-miner:local
    container_name: btx-miner
    restart: unless-stopped         # keep the miner up across daemon/host hiccups
    stop_grace_period: 120s        # give btxd time to flush cleanly on stop (entrypoint traps SIGTERM)
    gpus: all                      # requires nvidia-container-toolkit on the host
    environment:
      # source  = run the 0.32.10 binaries compiled into the image (default).
      # release = download + GPG-verify the signed precompiled release instead;
      #           for that, also set RELEASE_TAG=v0.32.10 here.
      BTX_INSTALL_MODE: source
      BTX_MATMUL_BACKEND: cuda
      # 1 (default) = node + GPU mining (solo). 0 = NODE-ONLY: run btxd for the
      # wallet/RPC with NO mining and NO GPU, so it can sit alongside btx-pool and
      # let `make balance`/`make stats` work while pooling. `make node` sets this 0;
      # `make solo` leaves it at the default 1. See entrypoint.sh step 5d.
      BTX_MINING_ENABLED: ${BTX_MINING_ENABLED:-1}
      # --- v3 solver pipeline-overlap knobs (Phase 2 sweep) ---------------
      # Passthrough only; ALL default to the stock SERIAL behaviour so an
      # unset env (plain `make solo`) is byte-for-byte the old path. The
      # overlap btxd lives in image btx-miner:overlap and is BYTE-EXACT vs
      # serial (Phase 1). async=1 turns the overlap on; the rest tune it.
      BTX_MATMUL_PIPELINE_ASYNC: ${BTX_MATMUL_PIPELINE_ASYNC:-0}
      BTX_MATMUL_PREPARE_PREFETCH_DEPTH: ${BTX_MATMUL_PREPARE_PREFETCH_DEPTH:-}
      BTX_MATMUL_PREPARE_WORKERS: ${BTX_MATMUL_PREPARE_WORKERS:-}
      BTX_MATMUL_GPU_INPUTS: ${BTX_MATMUL_GPU_INPUTS:-}
    volumes:
      - ./btx-data:/data           # blockchain + YOUR wallet (self-custody) — back this up
    # Intentionally NO published ports: the RPC interface stays inside the container.

  # OPTIONAL pool-mining mode (minebtx / DEXBTX). Gated behind the "pool" profile
  # so plain `docker compose up -d` (and `make up`) NEVER starts it — only
  # `make pool` does. Solo and pool can't run at once (they'd fight over the GPU),
  # so the make targets stop one before starting the other. Pool mode uses the
  # pool's own btx-gbt-solve (BTX v0.32.10 — ships our PR#58 kernels, now upstreamed,
  # so it's roughly comparable to solo) and trades a 2.5% fee for steady PPLNS payouts.
  # See Dockerfile.pool for the trust note.
  btx-pool:
    profiles: ["pool"]             # opt-in: started only via `make pool`
    build:
      context: .
      dockerfile: Dockerfile.pool
    image: btx-miner-pool:local
    container_name: btx-pool
    restart: unless-stopped
    gpus: all                      # contends with btx-miner — run one at a time
    environment:
      # Payout address is injected by `make pool` from address.txt (kept out of
      # committed files). Unset => the entrypoint refuses to start (fail loud).
      BTX_PAYOUT_ADDRESS: ${BTX_PAYOUT_ADDRESS:-}
      BTX_POOL_HOST: minebtx.com
      BTX_POOL_PORT: "3333"
      BTX_POOL_WORKER: ${BTX_POOL_WORKER:-KING}
      # 12 (down from 16) per tuning: sustains ~17K on this card. With gpu_inputs=1
      # the solver is GPU-bound so 12-24 are all within ~0.5% (thread count only
      # matters on the CPU-gated gpu_inputs=0 path); 12 leaves more CPU headroom.
      BTX_SOLVER_THREADS: ${BTX_SOLVER_THREADS:-12}
      # gpu_inputs=1 default: on-GPU input generation. Verified on the 5090 this
      # takes the card from ~5% util (the pool's CPU-gated gpu_inputs:0 default,
      # which starves a fast GPU) to ~70-85% with shares landing. Override with
      # BTX_GPU_INPUTS=0 for a slow card where CPU-side prep keeps up.
      BTX_GPU_INPUTS: ${BTX_GPU_INPUTS:-1}
    # NO volumes: the pool client needs no wallet/chain data — payout is to a
    # public address, so no keys are mounted into the third-party solver.

  # MATADOR — our BTX MatMul pool miner (fork of thekillsquad007/btx-nvidia-miner): an
  # integrated stratum+CUDA binary that saturates the 5090 (~86-95%) and lands valid
  # v3 shares, unlike the official btx-gbt-solve which regressed to ~3% util after v3.
  # Built from source at a pinned, audited commit (Dockerfile.matador). Started only
  # via `make matador`. Sandboxed: non-root, NO wallet/datadir mount, egress is the
  # stratum pool only (audited). Our kernel optimizations apply as build patches.
  matador:
    profiles: ["matador"]
    build:
      context: .
      dockerfile: Dockerfile.matador
    image: matador:local
    container_name: matador
    restart: unless-stopped
    gpus: all                      # contends with btx-miner/btx-pool — run one at a time
    environment:
      BTX_PAYOUT_ADDRESS: ${BTX_PAYOUT_ADDRESS:-}
      BTX_POOL_HOST: stratum.minebtx.com
      BTX_POOL_PORT: "3333"
      BTX_POOL_WORKER: ${BTX_POOL_WORKER:-MATADOR}
      # Upstream dev fee (1 slice in 100, ~1%). Set BTX_DEV_FEE=0 to keep all shares.
      BTX_DEV_FEE: ${BTX_DEV_FEE:-1}
      # Batch size = the dominant throughput lever. Swept on the 5090: batch=32768 gives
      # +107% over the 0.2.32 auto-pick (2626) at best nonces/watt (29.7k n/s/W, ~455W),
      # within 4% of the raw peak (65536). VRAM is NOT the bound (~7GB of 32GB used). See
      # bench/matador-batch-sweep.md. Override via BTX_BATCH (e.g. 65536 for peak raw rate).
      BTX_BATCH: ${BTX_BATCH:-32768}
    # NO volumes: pool mode needs no wallet/chain data.
