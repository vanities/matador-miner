services:
  btx-miner:
    build:
      context: .
      args:
        # 0.32.5 compiled from source. Signed cuda13 prebuilts exist for releases,
        # but we compile by choice: it guarantees native sm_120 codegen for the
        # 5090 (the prebuilt's embedded archs are unverified) and yields a
        # byte-reproducible build from a pinned tag commit. 0.32.5 = a non-consensus
        # Apple-Metal-only digest fix (no-op for CUDA); CUDA kernels unchanged, so
        # the six local patches apply unchanged. Tracked just to stay on latest.
        BTX_SOURCE_REF: 87bb8dea8cc834dc3fad5fb846368f2ba0a3f266
        BTX_CUDA_ARCHITECTURES: "120"   # sm_120 = RTX 5090 (Blackwell)
        # Local windowed-SHA scanner patch (byte-exact, +5.4%) is applied by
        # default (see Dockerfile + patches/). Build stock upstream instead with:
        #   APPLY_LOCAL_PATCHES: "0"
    image: btx-miner:local
    container_name: btx-miner
    restart: unless-stopped         # keep the miner up across daemon/host hiccups
    stop_grace_period: 120s        # give btxd time to flush cleanly on stop (entrypoint traps SIGTERM)
    gpus: all                      # requires nvidia-container-toolkit on the host
    environment:
      # source  = run the 0.32.3 binaries compiled into the image (default).
      # release = download + GPG-verify the signed precompiled release instead;
      #           for that, also set RELEASE_TAG=v0.32.3 here.
      BTX_INSTALL_MODE: source
      BTX_MATMUL_BACKEND: cuda
    volumes:
      - ./btx-data:/data           # blockchain + YOUR wallet (self-custody) — back this up
    # Intentionally NO published ports: the RPC interface stays inside the container.

  # OPTIONAL pool-mining mode (minebtx / DEXBTX). Gated behind the "pool" profile
  # so plain `docker compose up -d` (and `make up`) NEVER starts it — only
  # `make pool` does. Solo and pool can't run at once (they'd fight over the GPU),
  # so the make targets stop one before starting the other. Pool mode uses the
  # pool's own btx-gbt-solve (BTX v0.32.5 — now ships our PR#58 kernels, so it's
  # roughly comparable to solo) and trades a 2.5% fee for steady PPLNS payouts.
  # See Dockerfile.pool for the trust note.
  btx-pool:
    profiles: ["pool"]             # opt-in: started only via `make pool`
    build:
      context: .
      dockerfile: Dockerfile.pool
    image: btx-miner-pool:local
    container_name: btx-pool
    restart: unless-stopped
    gpus: all                      # contends with btx-miner — run one at a time
    environment:
      # Payout address is injected by `make pool` from address.txt (kept out of
      # committed files). Unset => the entrypoint refuses to start (fail loud).
      BTX_PAYOUT_ADDRESS: ${BTX_PAYOUT_ADDRESS:-}
      BTX_POOL_HOST: minebtx.com
      BTX_POOL_PORT: "3333"
    # NO volumes: the pool client needs no wallet/chain data — payout is to a
    # public address, so no keys are mounted into the third-party solver.
